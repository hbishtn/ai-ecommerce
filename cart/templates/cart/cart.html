<!DOCTYPE html>
<html>

<head>

    <title>Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1>Your Cart</h1>

    <hr>

    {% for item in cart_items %}

    <div class="card mb-3">

        <div class="card-body">

            <h3>{{ item.product.name }}</h3>

            <p>Price: ₹{{ item.product.price }}</p>

            <div class="d-flex gap-2 align-items-center">

                <a href="{% url 'decrease_quantity' item.product.id %}" class="btn btn-danger">
                    -
                </a>

                <span>{{ item.quantity }}</span>

                <a href="{% url 'increase_quantity' item.product.id %}" class="btn btn-success">
                    +
                </a>
                <a href="{% url 'remove_from_cart' item.product.id %}" class="btn btn-dark mt-3">

                    Remove

                </a>
            </div>

            <p>Subtotal: ₹{{ item.subtotal }}</p>

        </div>

    </div>

    {% endfor %}

    <hr>

    <h2>Total: ₹{{ total }}</h2>
    <a href="{% url 'checkout' %}" class="btn btn-success">

        Checkout

    </a>

</div>

</body>
</html>
