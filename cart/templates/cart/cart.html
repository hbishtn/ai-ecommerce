<!DOCTYPE html>
<html>

<head>

    {% load static %}
    <title>Cart</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/ui.css' %}" rel="stylesheet">

</head>

<body>

<div class="container">
    <div class="cart-header">
        <h1 class="mb-3">Your Cart</h1>
        <p class="text-muted">Review items, adjust quantities, and proceed to checkout.</p>
    </div>

    {% for item in cart_items %}
    <div class="card product-card mb-3">
        <div class="card-body">
            <div class="row align-items-center gy-3">
                <div class="col-md-8">
                    <h3 class="mb-1">{{ item.product.name }}</h3>
                    <p class="mb-1 text-secondary">Price: ₹{{ item.product.price }}</p>
                    <p class="mb-0">Subtotal: ₹{{ item.subtotal }}</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <div class="d-inline-flex align-items-center gap-2 mb-2">
                        <a href="{% url 'decrease_quantity' item.product.id %}" class="btn btn-danger btn-sm">-</a>
                        <span class="px-3 py-2 border rounded">{{ item.quantity }}</span>
                        <a href="{% url 'increase_quantity' item.product.id %}" class="btn btn-success btn-sm">+</a>
                    </div>
                    <div>
                        <a href="{% url 'remove_from_cart' item.product.id %}" class="btn btn-dark btn-sm">
                            Remove
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}

    <div class="cart-summary text-end">
        <h2 class="mb-3">Total: ₹{{ total }}</h2>
        <a href="{% url 'checkout' %}" class="btn btn-success btn-lg">
            Checkout
        </a>
    </div>
</div>
<!-- Theme picker widget -->
<div id="theme-picker" class="theme-picker">
    <div class="d-flex flex-column align-items-end">
        <button id="theme-toggle" class="btn btn-outline-dark picker-toggle">🎨</button>
        <div id="theme-options" class="options d-none bg-white p-2 rounded shadow mt-2">
            <div class="d-flex gap-2">
                <button class="theme-color-btn" data-color="#0ea5a4" style="background:#0ea5a4"></button>
                <button class="theme-color-btn" data-color="#ef4444" style="background:#ef4444"></button>
                <button class="theme-color-btn" data-color="#2563eb" style="background:#2563eb"></button>
                <button class="theme-color-btn" data-color="#111827" style="background:#111827"></button>
            </div>
        </div>
    </div>
</div>
<script src="{% static 'js/theme.js' %}"></script>

</body>
</html>
