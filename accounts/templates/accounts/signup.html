<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fb; color: #222; }
        .auth-card { max-width: 420px; margin: 5rem auto; border: 0; border-radius: 1rem; box-shadow: 0 20px 60px rgba(17, 24, 39, .1); }
        .auth-title { font-weight: 700; letter-spacing: .02em; }
        .form-control:focus { box-shadow: 0 0 0 .2rem rgba(33, 37, 41, .15); }
    </style>

</head>

<body>

<div class="container">
    <div class="card auth-card p-4">
        <div class="card-body">
            <h1 class="auth-title mb-2">Create Account</h1>
            <p class="text-muted mb-4">Sign up to start exploring products.</p>
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" class="form-control mb-3">
                <input type="email" name="email" placeholder="Email" class="form-control mb-3">
                <input type="password" name="password" placeholder="Password" class="form-control mb-3">
                <button type="submit" class="btn btn-dark w-100 py-2">
                    Signup
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
