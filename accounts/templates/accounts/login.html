<!DOCTYPE html>
<html>

<head>

    {% load static %}
    <title>Login</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/ui.css' %}" rel="stylesheet">

</head>

<body>

<div class="container">
    <div class="card auth-card p-4">
        <div class="card-body">
            <h1 class="auth-title mb-2">Welcome Back</h1>
            <p class="text-muted mb-4">Login to continue shopping with ease.</p>
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" class="form-control mb-3">
                <input type="password" name="password" placeholder="Password" class="form-control mb-3">
                <button type="submit" class="btn btn-dark w-100 py-2">
                    Login
                </button>
            </form>
        </div>
    </div>
</div>
        <!-- Theme picker widget -->
        <div id="theme-picker" class="theme-picker">
            <div class="d-flex flex-column align-items-end">
                <button id="theme-toggle" class="btn btn-outline-dark picker-toggle">🎨</button>
                <div id="theme-options" class="options d-none bg-white p-2 rounded shadow mt-2">
                    <div class="d-flex gap-2">
                        <button class="theme-color-btn" data-color="#0ea5a4" style="background:#0ea5a4"></button>
                        <button class="theme-color-btn" data-color="#ef4444" style="background:#ef4444"></button>
                        <button class="theme-color-btn" data-color="#2563eb" style="background:#2563eb"></button>
                        <button class="theme-color-btn" data-color="#111827" style="background:#111827"></button>
                    </div>
                </div>
            </div>
        </div>
        <script src="{% static 'js/theme.js' %}"></script>

        </body>
        </html>
