<!DOCTYPE html>
<html>

<head>

    <title>AI Assistant</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f6; color: #1f2937; }
        .assistant-card { border: 0; border-radius: 1.25rem; box-shadow: 0 24px 70px rgba(15, 23, 42, .08); }
        .response-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: .9rem; }
        .btn-dark { min-width: 130px; }
        .hero-title { letter-spacing: .01em; }
    </style>

</head>

<body>

<div class="container py-5">
    <div class="card assistant-card p-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
            <div>
                <h1 class="hero-title mb-2">Groq AI Assistant</h1>
                <p class="text-muted mb-0">Ask any question and get instant smart answers.</p>
            </div>
            <a href="/" class="btn btn-outline-dark align-self-center">
                Home
            </a>
        </div>

        <form method="POST">
            {% csrf_token %}
            <textarea
                name="prompt"
                class="form-control mb-3"
                placeholder="Ask AI..."
                rows="5"
            ></textarea>
            <button type="submit" class="btn btn-dark">
                Ask AI
            </button>
        </form>

        <div class="mt-4 response-card p-4">
            <h3 class="mb-3">AI Response</h3>
            <p class="mb-0">{{ response }}</p>
        </div>
    </div>
</div>

</body>
</html>
