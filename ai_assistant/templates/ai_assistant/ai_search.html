<!DOCTYPE html>
<html>

<head>

    {% load static %}
    <title>AI Assistant</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/ui.css' %}" rel="stylesheet">

</head>

<body>

<div class="container py-5">
    <div class="card assistant-card p-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
            <div>
                <h1 class="hero-title mb-2">Shop Boat</h1>
                <p class="text-muted mb-0">Ask any question and get instant smart answers.</p>
            </div>
            <a href="/" class="btn btn-outline-dark align-self-center">
                Home
            </a>
        </div>

        <form method="POST">
            {% csrf_token %}
            <textarea
                name="prompt"
                class="form-control mb-3"
                placeholder="Ask AI..."
                rows="5"
            ></textarea>
            <button type="submit" class="btn btn-dark">
                Ask AI
            </button>
        </form>

        <div class="mt-4 response-card p-4">
            <h3 class="mb-3">AI Response</h3>
            <p class="mb-0">{{ response }}</p>
        </div>
    </div>
</div>
        <!-- Theme picker widget -->
        <div id="theme-picker" class="theme-picker">
            <div class="d-flex flex-column align-items-end">
                <button id="theme-toggle" class="btn btn-outline-dark picker-toggle">🎨</button>
                <div id="theme-options" class="options d-none bg-white p-2 rounded shadow mt-2">
                    <div class="d-flex gap-2">
                        <button class="theme-color-btn" data-color="#0ea5a4" style="background:#0ea5a4"></button>
                        <button class="theme-color-btn" data-color="#ef4444" style="background:#ef4444"></button>
                        <button class="theme-color-btn" data-color="#2563eb" style="background:#2563eb"></button>
                        <button class="theme-color-btn" data-color="#111827" style="background:#111827"></button>
                    </div>
                </div>
            </div>
        </div>
        <script src="{% static 'js/theme.js' %}"></script>

        </body>
        </html>
