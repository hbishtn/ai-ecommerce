<!DOCTYPE html>
<html>

<head>

    {% load static %}
    <title>My Orders</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/ui.css' %}" rel="stylesheet">

</head>

<body>

<div class="container">
    <div class="page-title">
        <h1 class="mb-2">My Orders</h1>
        <p class="text-muted">A clean view of your recent purchases.</p>
    </div>

    {% for order in orders %}
        <div class="card order-card mb-3">
            <div class="card-body">
                <h4 class="mb-2">{{ order.name }}</h4>
                <p class="order-meta mb-1">{{ order.city }}</p>
                <p class="order-meta mb-0">{{ order.created_at }}</p>
            </div>
        </div>
    {% endfor %}
</div>
<!-- Theme picker widget -->
<div id="theme-picker" class="theme-picker">
    <div class="d-flex flex-column align-items-end">
        <button id="theme-toggle" class="btn btn-outline-dark picker-toggle">🎨</button>
        <div id="theme-options" class="options d-none bg-white p-2 rounded shadow mt-2">
            <div class="d-flex gap-2">
                <button class="theme-color-btn" data-color="#0ea5a4" style="background:#0ea5a4"></button>
                <button class="theme-color-btn" data-color="#ef4444" style="background:#ef4444"></button>
                <button class="theme-color-btn" data-color="#2563eb" style="background:#2563eb"></button>
                <button class="theme-color-btn" data-color="#111827" style="background:#111827"></button>
            </div>
        </div>
    </div>
</div>
<script src="{% static 'js/theme.js' %}"></script>

</body>
</html>
