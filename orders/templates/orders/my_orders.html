<!DOCTYPE html>
<html>

<head>

    <title>My Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1>My Orders</h1>

    <hr>

    {% for order in orders %}

        <div class="card mb-3">

            <div class="card-body">

                <h4>{{ order.name }}</h4>

                <p>{{ order.city }}</p>

                <p>{{ order.created_at }}</p>

            </div>

        </div>

    {% endfor %}

</div>

</body>
</html>
