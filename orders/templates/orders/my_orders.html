<!DOCTYPE html>
<html>

<head>

    <title>My Orders</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fb; color: #1f2937; }
        .order-card { border: 0; border-radius: 1rem; box-shadow: 0 18px 50px rgba(15, 23, 42, .06); }
        .page-title { margin-top: 4rem; margin-bottom: 1rem; }
        .order-meta { color: #6b7280; }
    </style>

</head>

<body>

<div class="container">
    <div class="page-title">
        <h1 class="mb-2">My Orders</h1>
        <p class="text-muted">A clean view of your recent purchases.</p>
    </div>

    {% for order in orders %}
        <div class="card order-card mb-3">
            <div class="card-body">
                <h4 class="mb-2">{{ order.name }}</h4>
                <p class="order-meta mb-1">{{ order.city }}</p>
                <p class="order-meta mb-0">{{ order.created_at }}</p>
            </div>
        </div>
    {% endfor %}
</div>

</body>
</html>
