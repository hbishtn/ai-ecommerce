<!DOCTYPE html>
<html>

<head>

    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1>Checkout</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text" name="name" placeholder="Name" class="form-control mb-3">

        <input type="email" name="email" placeholder="Email" class="form-control mb-3">

        <textarea name="address" placeholder="Address" class="form-control mb-3"></textarea>

        <input type="text" name="city" placeholder="City" class="form-control mb-3">

        <button class="btn btn-dark">
            Place Order
        </button>

    </form>

</div>

</body>
</html>
