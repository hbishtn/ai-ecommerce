<!DOCTYPE html>
<html>

<head>

    {% load static %}
    <title>Checkout</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/ui.css' %}" rel="stylesheet">

</head>

<body>

<div class="container">
    <div class="card checkout-card p-4">
        <div class="card-body">
            <h1 class="mb-3">Checkout</h1>
            <p class="text-muted mb-4">Enter your details to place your order.</p>
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="name" placeholder="Name" class="form-control mb-3">
                <input type="email" name="email" placeholder="Email" class="form-control mb-3">
                <textarea name="address" placeholder="Address" class="form-control mb-3" rows="4"></textarea>
                <input type="text" name="city" placeholder="City" class="form-control mb-3">
                <button type="submit" class="btn btn-dark py-2 px-4">
                    Place Order
                </button>
            </form>
        </div>
    </div>
</div>
        <!-- Theme picker widget -->
        <div id="theme-picker" class="theme-picker">
            <div class="d-flex flex-column align-items-end">
                <button id="theme-toggle" class="btn btn-outline-dark picker-toggle">🎨</button>
                <div id="theme-options" class="options d-none bg-white p-2 rounded shadow mt-2">
                    <div class="d-flex gap-2">
                        <button class="theme-color-btn" data-color="#0ea5a4" style="background:#0ea5a4"></button>
                        <button class="theme-color-btn" data-color="#ef4444" style="background:#ef4444"></button>
                        <button class="theme-color-btn" data-color="#2563eb" style="background:#2563eb"></button>
                        <button class="theme-color-btn" data-color="#111827" style="background:#111827"></button>
                    </div>
                </div>
            </div>
        </div>
        <script src="{% static 'js/theme.js' %}"></script>

        </body>
        </html>
