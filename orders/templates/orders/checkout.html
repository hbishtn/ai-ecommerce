<!DOCTYPE html>
<html>

<head>

    <title>Checkout</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f6; color: #1f2937; }
        .checkout-card { max-width: 640px; margin: 4rem auto; border: 0; border-radius: 1rem; box-shadow: 0 24px 60px rgba(15, 23, 42, .08); }
        .form-label { font-weight: 600; }
        .btn-dark { min-width: 140px; }
    </style>

</head>

<body>

<div class="container">
    <div class="card checkout-card p-4">
        <div class="card-body">
            <h1 class="mb-3">Checkout</h1>
            <p class="text-muted mb-4">Enter your details to place your order.</p>
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="name" placeholder="Name" class="form-control mb-3">
                <input type="email" name="email" placeholder="Email" class="form-control mb-3">
                <textarea name="address" placeholder="Address" class="form-control mb-3" rows="4"></textarea>
                <input type="text" name="city" placeholder="City" class="form-control mb-3">
                <button type="submit" class="btn btn-dark py-2 px-4">
                    Place Order
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
