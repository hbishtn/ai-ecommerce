<!DOCTYPE html>
<html>

<head>
    {% load static %}
    <title>Order Success</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/ui.css' %}" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card success-card text-center p-5">
            <div class="card-body">
                <h1 class="mb-3">Order Placed Successfully 🎉</h1>
                <p class="text-muted mb-4">Thank you for your purchase — your order is confirmed and being processed.</p>
                <a href="/" class="btn btn-dark btn-lg">Continue Shopping</a>
            </div>
        </div>
    </div>
</body>
<!-- Theme picker widget -->
<div id="theme-picker" class="theme-picker">
    <div class="d-flex flex-column align-items-end">
        <button id="theme-toggle" class="btn btn-outline-dark picker-toggle">🎨</button>
        <div id="theme-options" class="options d-none bg-white p-2 rounded shadow mt-2">
            <div class="d-flex gap-2">
                <button class="theme-color-btn" data-color="#0ea5a4" style="background:#0ea5a4"></button>
                <button class="theme-color-btn" data-color="#ef4444" style="background:#ef4444"></button>
                <button class="theme-color-btn" data-color="#2563eb" style="background:#2563eb"></button>
                <button class="theme-color-btn" data-color="#111827" style="background:#111827"></button>
            </div>
        </div>
    </div>
</div>
<script src="{% static 'js/theme.js' %}"></script>

</html>
