<!DOCTYPE html>
<html>

<head>
    <title>Order Success</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f6; color: #111827; }
        .success-card { max-width: 600px; margin: 8rem auto; border: 0; border-radius: 1.25rem; box-shadow: 0 24px 70px rgba(15, 23, 42, .08); }
        .btn-dark { min-width: 140px; }
    </style>
</head>

<body>
    <div class="container">
        <div class="card success-card text-center p-5">
            <div class="card-body">
                <h1 class="mb-3">Order Placed Successfully 🎉</h1>
                <p class="text-muted mb-4">Thank you for your purchase — your order is confirmed and being processed.</p>
                <a href="/" class="btn btn-dark btn-lg">Continue Shopping</a>
            </div>
        </div>
    </div>
</body>
</html>
